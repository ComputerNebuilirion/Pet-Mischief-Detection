justification: "\n    Our mischief logic uses spatial relationships (distance and\
  \ IoU) between \n    detected pets and objects. This rule-based approach is interpretable\
  \ and \n    adjustable - we can easily tune thresholds or add new rules. The logic\
  \ \n    considers both dangerous scenarios (cat near cup) and safe scenarios \n\
  \    (dog on couch) to provide context-aware alerts.\n    "
model: runs/detect/runs/train/pet_mischief_exp/weights/best.pt
rules:
  high_risk_conditions:
  - Pet touching object (IoU > 0.001)
  - Pet within 80px of dangerous object (cup, vase, laptop, plant)
  low_risk_conditions:
  - Pet on couch (resting)
  - Pet far from all objects
  medium_risk_conditions:
  - Pet within 150px of dangerous object
task: 'Task 4 Part B: Mischief System Evaluation'
